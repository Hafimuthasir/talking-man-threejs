<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Talking Man — three.js viewer</title>
<link rel="stylesheet" href="style.css" />
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
  <div id="viewer"></div>

  <div id="ui">
    <div id="status">Loading character…</div>

    <div id="controls">
      <button id="demoBtn">Demo Voice</button>

      <label id="uploadLabel" for="audioFile">Upload voice (mp3)</label>
      <input type="file" id="audioFile" accept="audio/*" />

      <button id="talkBtn" disabled>Click to Talk</button>

      <button id="resetViewBtn">Reset View</button>
    </div>

    <div id="fileName"></div>
  </div>

  <audio id="audioEl" preload="auto"></audio>

  <div id="chat-panel">
    <div id="chat-header">
      <span id="chat-dot"></span>
      Nova Bank Assistant
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-row">
      <button id="micBtn" title="Voice input" aria-label="Voice input">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <input id="chatInput" type="text" placeholder="Ask about Nova Bank…" autocomplete="off" />
      <button id="sendBtn" title="Send" aria-label="Send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- The ?v= query bumps on every main.js edit so the browser doesn't
       serve a stale cached copy of the module on reload (this static
       file server doesn't send cache-busting headers itself). -->
  <script type="module" src="main.js?v=15"></script>
</body>
</html>
